name: Copier Updates

# Pull template updates into this repo. Uses the built-in GITHUB_TOKEN (no PAT secret
# needed for public templates and PRs in this repository).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 0"

jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: pip install copier
        shell: bash

      - run: copier update -A -f -a .copier-answers*
        shell: bash

      - if: hashFiles('pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@v4
        with:
          version: 9
        continue-on-error: true
      - if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --no-frozen-lockfile
        shell: bash
        continue-on-error: true
      - if: hashFiles('js/pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@v4
        with:
          version: 9
          package_json_file: js/package.json
        continue-on-error: true
      - if: hashFiles('js/pnpm-lock.yaml') != ''
        run: cd js && pnpm install --no-frozen-lockfile
        shell: bash
        continue-on-error: true

      - if: hashFiles('Cargo.lock', 'rust/Cargo.lock') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
        continue-on-error: true
      - if: hashFiles('Cargo.lock') != ''
        run: cargo update
        shell: bash
        continue-on-error: true
      - if: hashFiles('rust/Cargo.lock') != ''
        run: cd rust && cargo update
        shell: bash
        continue-on-error: true

      - run: |
          if [[ $(git status --porcelain -- ':!.copier-answers.yml' ':!.copier-answers.yaml') ]]; then
            CURRENT_DATE=$(date -u +"%Y-%m-%dT%H-%M-%S")
            MESSAGE="Update from copier ($(date -u +"%Y-%m-%dT%H:%M:%SZ"))"
            BRANCH=copier-update-${CURRENT_DATE}
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b "${BRANCH}"
            git add .
            git commit -m "${MESSAGE}" -s
            git push origin "${BRANCH}"
            gh pr create -B "${{ github.event.repository.default_branch }}" -H "${BRANCH}" --title "${MESSAGE}" --body ""
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
